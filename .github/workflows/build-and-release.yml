name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ViktoriaFox/Vektory-Application   # private source repo (owner/repo)
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and package (Windows NSIS)
        run: yarn dist -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 3

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ViktoriaFox/Vektory-Application   # private source repo (owner/repo)
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and package (macOS DMG)
        run: yarn dist -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg
          retention-days: 3

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vektory ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            See the [Install Guide](https://ViktoriaFox.github.io/Vektory/install) for download and installation instructions (including SmartScreen / Gatekeeper workarounds).

            [Changelog](https://ViktoriaFox.github.io/Vektory/CHANGELOG) · [Architecture](https://ViktoriaFox.github.io/Vektory/architecture)
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
